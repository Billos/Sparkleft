services:
  redis:
    image: redis:7-alpine

  server:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["dev:server"]
    volumes:
      - .:/app
    env_file:
      - .env
    ports:
      - "0.0.0.0:3000:3000"
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["dev:worker"]
    volumes:
      - .:/app
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    command: ["dev:frontend"]
    env_file:
      - .env
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      NODE_ENV: development
    restart: unless-stopped

volumes:
  redis-data:
  frontend_node_modules:
