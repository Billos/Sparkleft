name: Setup Node and install dependencies
description: Setup Node.js with Corepack and install dependencies via Yarn

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "22"
        cache: "yarn"
        cache-dependency-path: yarn.lock

    - name: Enable Corepack
      shell: bash
      run: corepack enable

    - name: Install dependencies
      shell: bash
      run: yarn install --immutable
