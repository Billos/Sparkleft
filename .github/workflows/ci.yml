name: CI

# Runs linting, formatting checks, and builds on pull requests and non-main branches
# This ensures code quality before merging to main

on:
  pull_request:
    branches:
      - main
  push:
    branches-ignore:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    name: Lint and Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup-node-and-install

      - name: Run linter
        run: yarn lint

      - name: Check formatting
        run: yarn format-check

      - name: Build project
        run: yarn build

      - name: Run tests
        run: yarn test
